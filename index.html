<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otoz Connect · Splash Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Inter', sans-serif;
    background: #e8e8ed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ DEVICE FRAME ============ */
  .device {
    width: 380px;
    height: 800px;
    background: #1d1d1f;
    border-radius: 54px;
    padding: 11px;
    position: relative;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.08);
  }

  .screen-wrapper {
    width: 100%;
    height: 100%;
    background: #ffffff;
    border-radius: 43px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dynamic-island {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 33px;
    background: #1d1d1f;
    border-radius: 18px;
    z-index: 100;
    pointer-events: none;
  }

  .home-indicator {
    position: absolute;
    bottom: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 5px;
    background: #1d1d1f;
    border-radius: 3px;
    opacity: 0.9;
    z-index: 100;
    pointer-events: none;
  }

  /* ============ SPLASH CONTENT ============ */
  .splash-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* ---- GIF ---- */
  .splash-gif {
    width: 480px;       /* chahen to size badal saktay hain */
    height: auto;
    display: block;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 420px) {
    body { padding: 0; background: #fff; }
    .device {
      width: 100%;
      height: 100vh;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }
    .screen-wrapper { border-radius: 0; }
  }
</style>
</head>
<body>

<div class="device">
  <div class="screen-wrapper">

    <div class="dynamic-island"></div>
    <div class="home-indicator"></div>

    <!-- ========== SPLASH SCREEN ========== -->
    <div class="splash-content">

      <!--
        👇 APNI GIF KA PATH YAHAN LIKHEN
        Agar GIF is HTML file ke saath same folder mein hai to sirf file name likhen:
            src="otoz_connect_variation_2.gif"
        Agar kisi aur folder mein hai to pura path likhen:
            src="assets/otoz_connect_variation_2.gif"
      -->
      <img
        src="animation.gif"
        alt="Otoz Connect"
        class="splash-gif"
        draggable="false"
        decoding="async"
      />

    </div>

  </div>
</div>

<script>
  (function () {
    const splash = document.querySelector('.splash-content');

    if (!splash) return;

    // Use the GIF's real playback duration instead of a short timer.
    const FRAME_COUNT = 100;
    const FRAME_DELAY_MS = 50;
    const SPLASH_DURATION_MS = FRAME_COUNT * FRAME_DELAY_MS;

    setTimeout(function () {
      window.location.replace('login.html');
    }, SPLASH_DURATION_MS);
  })();
</script>

</body>
</html>
